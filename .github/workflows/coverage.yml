name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  upload-coverage:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # g++-14 is required for <print> — see README.md (native builds).
    - name: Install dependencies
      run: sudo apt update && sudo apt install -y lcov gcovr g++-14

    - name: Configure (native host + coverage flags)
      run: cmake --preset=test-native
      env:
        CC: gcc-14
        CXX: g++-14

    - name: Build
      run: cmake --build --preset=test-native

    - name: Run tests
      run: ctest --preset=test-native
      continue-on-error: true

    - name: Generate coverage report (Cobertura XML)
      run: |
        gcovr \
          --root . \
          --exclude 'tests/.*' \
          --exclude 'vendor/.*' \
          --exclude 'cmake/.*' \
          --exclude '.*/_deps/.*' \
          --exclude '.*CMakeFiles.*' \
          --gcov-executable gcov-14 \
          --gcov-ignore-errors=no_working_dir_found \
          --xml build/test-native/coverage.xml \
          --xml-pretty \
          build/test-native

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: onurtuncer/Hemerion
        files: build/test-native/coverage.xml
        fail_ci_if_error: false
        verbose: true
