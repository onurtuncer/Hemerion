name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-native:
    runs-on: windows-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Configure
        run: cmake --preset test-native

      - name: Build
        run: cmake --build --preset test-native

      - name: Run tests
        run: ctest --preset test-native --output-on-failure
