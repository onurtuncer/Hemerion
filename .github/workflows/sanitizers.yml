name: Sanitizers

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  asan-ubsan:
    name: ASan + UBSan (test-native)
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: check_initialization_order=1:detect_stack_use_after_return=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
    - name: Checkout repo
      uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Install dependencies
      run: sudo apt update && sudo apt install -y gcc-13 g++-13

    - name: Configure compiler alternatives
      run: |
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

    # cmake/sanitizers.cmake enables ASan + UBSan for the test-native preset
    # on supported compilers — see cmake/README.md.
    - name: Configure
      run: cmake --preset=test-native

    - name: Build
      run: cmake --build --preset=test-native

    - name: Run tests
      run: ctest --preset=test-native --output-on-failure
