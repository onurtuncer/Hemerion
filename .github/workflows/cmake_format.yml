name: CMake-Format

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'modules/**'
      - 'apps/**'
      - 'bsp/**'
      - 'sim/**'
      - 'cmake/**'
      - 'toolchains/**'
      - 'CMakeLists.txt'
      - '.github/workflows/cmake_format.yml'
      - '**/.cmake-format'
      - '.run-cmake-format'
  schedule:
    - cron: '0 5 * * *'

jobs:
  cmake_format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Run CMake Lang Format Check
        run: |
          sudo pip3 install --break-system-packages cmakelang
          RED='\033[0;31m'
          NC='\033[0m' # No Color
          bash .run-cmake-format
          output=$(git diff)
          if [ -n "$output" ]; then printf "${RED}CMake format error: run script './.run-cmake-format'${NC}\n"; fi
          if [ -n "$output" ]; then printf "${RED}${output}${NC}\n"; fi
          if [ -n "$output" ]; then exit 1; else exit 0; fi
