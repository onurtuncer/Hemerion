        class="stroke-accent" fill="none" stroke-width="0.3"
        style="font-variant-ligatures: none;">ΗΜΕΡΙΟΝ</text>

  <line x1="300" y1="688" x2="500" y2="688" class="stroke-dim" stroke-width="0.5"/>

  <text x="400" y="715" text-anchor="middle"
        font-family="'Arial Narrow', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" letter-spacing="7"
        class="stroke-main" fill="none" stroke-width="0.2"
        style="font-weight:300;">HEMERION</text>

</svg>
