<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img">
  <title>HEMERION Logo</title>
  <desc>Geometric monogram for HEMERION embedded firmware framework — a stylised H letterform with circuit-board precision lines suggesting real-time embedded systems, the disciplined counterpart to Aetherion.</desc>

  <style>
    @media (prefers-color-scheme: dark) {
      .stroke-main { stroke: #d0e8ff; }
      .stroke-accent { stroke: #7ab8f5; }
      .stroke-dim { stroke: #3a5a7a; }
      .fill-accent { fill: #7ab8f5; }
      .fill-bg { fill: #0d1f2d; }
    }
    @media (prefers-color-scheme: light) {
      .stroke-main { stroke: #0a2540; }
      .stroke-accent { stroke: #1a5fa8; }
      .stroke-dim { stroke: #a8c4e0; }
      .fill-accent { fill: #1a5fa8; }
      .fill-bg { fill: #f0f6fc; }
    }
  </style>

  <circle cx="400" cy="400" r="340" fill="none" class="stroke-dim" stroke-width="1"/>
  <circle cx="400" cy="400" r="300" fill="none" class="stroke-dim" stroke-width="0.5" stroke-dasharray="4 6"/>

  <line x1="400" y1="60" x2="400" y2="90" class="stroke-accent" stroke-width="2"/>
  <line x1="400" y1="710" x2="400" y2="740" class="stroke-accent" stroke-width="2"/>
  <line x1="60" y1="400" x2="90" y2="400" class="stroke-accent" stroke-width="2"/>
  <line x1="710" y1="400" x2="740" y2="400" class="stroke-accent" stroke-width="2"/>

  <line x1="159" y1="159" x2="180" y2="180" class="stroke-dim" stroke-width="1"/>
  <line x1="641" y1="159" x2="620" y2="180" class="stroke-dim" stroke-width="1"/>
  <line x1="159" y1="641" x2="180" y2="620" class="stroke-dim" stroke-width="1"/>
  <line x1="641" y1="641" x2="620" y2="620" class="stroke-dim" stroke-width="1"/>

  <rect x="248" y="208" width="52" height="384" rx="6" fill="none" class="stroke-main" stroke-width="3.5"/>
  <rect x="500" y="208" width="52" height="384" rx="6" fill="none" class="stroke-main" stroke-width="3.5"/>
  <rect x="248" y="350" width="304" height="52" rx="4" fill="none" class="stroke-main" stroke-width="3.5"/>

  <rect x="250" y="210" width="48" height="380" rx="5" class="fill-accent" opacity="0.12"/>
  <rect x="502" y="210" width="48" height="380" rx="5" class="fill-accent" opacity="0.12"/>
  <rect x="250" y="352" width="300" height="48" rx="3" class="fill-accent" opacity="0.12"/>

  <line x1="180" y1="376" x2="250" y2="376" class="stroke-accent" stroke-width="1.5"/>
  <circle cx="180" cy="376" r="4" class="fill-accent" opacity="0.7"/>
  <circle cx="210" cy="376" r="2" fill="none" class="stroke-accent" stroke-width="1"/>

  <line x1="550" y1="376" x2="620" y2="376" class="stroke-accent" stroke-width="1.5"/>
  <circle cx="620" cy="376" r="4" class="fill-accent" opacity="0.7"/>
  <circle cx="590" cy="376" r="2" fill="none" class="stroke-accent" stroke-width="1"/>

  <line x1="274" y1="590" x2="274" y2="640" class="stroke-accent" stroke-width="1"/>
  <line x1="274" y1="640" x2="310" y2="640" class="stroke-dim" stroke-width="1" stroke-dasharray="3 3"/>

  <line x1="526" y1="210" x2="526" y2="160" class="stroke-accent" stroke-width="1"/>
  <line x1="526" y1="160" x2="490" y2="160" class="stroke-dim" stroke-width="1" stroke-dasharray="3 3"/>

