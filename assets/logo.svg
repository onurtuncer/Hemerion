  <circle cx="526" cy="160" r="5" fill="none" class="stroke-accent" stroke-width="1.5"/>

  <path d="M270 228 L248 228 L248 250" fill="none" class="stroke-accent" stroke-width="2" stroke-linecap="round"/>
  <path d="M530 228 L552 228 L552 250" fill="none" class="stroke-accent" stroke-width="2" stroke-linecap="round"/>
  <path d="M270 572 L248 572 L248 550" fill="none" class="stroke-accent" stroke-width="2" stroke-linecap="round"/>
  <path d="M530 572 L552 572 L552 550" fill="none" class="stroke-accent" stroke-width="2" stroke-linecap="round"/>

  <rect x="244" y="348" width="8" height="56" rx="2" class="fill-accent" opacity="0.5"/>
  <rect x="548" y="348" width="8" height="56" rx="2" class="fill-accent" opacity="0.5"/>

  <text x="400" y="680" text-anchor="middle"
